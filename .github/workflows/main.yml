name: Daily Vacancy Search

on:
  schedule:
    # Запуск каждый день в 06:00 по Гринвичу (в 06:00 по Москве)
    - cron: '0 6 * * *'
  workflow_dispatch: # Позволяет запускать бота вручную кнопкой в любой момент

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка кода
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Установка зависимостей
        run: |
          pip install -r requirements.txt

      - name: Запуск поиска вакансий
        run: |
          python main.py
